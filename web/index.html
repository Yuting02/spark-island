<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>星火岛 Spark Island</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏝️</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js" defer></script>
</head>
<body>
  <main id="stage">
    <canvas id="game"></canvas>

    <!-- HUD：任务（左上，可收起） -->
    <div id="hud-tasks" class="hud-card hud-panel">
      <h3 class="panel-head" id="hud-task-title">今日任务<span class="panel-arrow">▾</span></h3>
      <ul id="hud-task-list" class="panel-body"></ul>
    </div>

    <!-- HUD：玩家与金币（右上） -->
    <button id="hud-player" class="hud-card" title="打开岛民护照">🧢 …</button>

    <!-- HUD：地图导航（左下，可收起） -->
    <div id="minimap-panel" class="hud-card hud-panel">
      <h3 class="panel-head">🗺️ 地图<span class="panel-arrow">▾</span></h3>
      <canvas id="minimap" width="300" height="169" class="panel-body"></canvas>
    </div>

    <div id="hud-hint" class="hud-card">🖱️ 点击地面 / 建筑 / 角色 · ⌨️ WASD 移动 · E 互动 · Esc 关闭窗口</div>

    <!-- NPC 对话框（动森式） -->
    <div id="dialog" class="hidden">
      <span id="dialog-name"></span>
      <p id="dialog-text"></p>
      <span id="dialog-hint">▼ 按 E 或点击继续</span>
    </div>
  </main>

  <!-- 场景浮层 -->
  <div id="overlay" class="hidden">
    <div id="overlay-box">
      <div id="overlay-head">
        <span id="overlay-title"></span>
        <button id="overlay-close" class="ac-btn">✕ 关闭</button>
      </div>
      <div id="overlay-content"></div>
    </div>
  </div>

  <!-- 登录页（产品名只在这里展示） -->
  <div id="login" class="hidden">
    <div id="login-box">
      <h1>🏝️ 星火岛 <span>Spark Island</span></h1>
      <p class="login-sub">报亭读新闻 · 书屋记笔记 · 电台听播客 · 咖啡馆小坐</p>
      <div class="login-form">
        <input id="login-username" placeholder="用户名（3-20 位字母 / 数字 / 下划线）" autocomplete="username">
        <input id="login-password" type="password" placeholder="密码（至少 6 位）" autocomplete="current-password">
        <div class="login-row">
          <button id="btn-login" class="ac-btn ac-primary">登录</button>
          <button id="btn-register" class="ac-btn">注册新账户</button>
        </div>
        <div class="login-msg" id="login-msg"></div>
      </div>
      <div class="login-divider"><span>或</span></div>
      <button id="btn-guest" class="ac-btn">👤 游客身份进入（进度不保存）</button>
    </div>
  </div>

  <div id="toast"></div>
  <div id="celebrate" class="hidden">
    <div id="celebrate-box">🎉 今日任务全部完成！<br><span>岛上的一天圆满收工，明天见～</span></div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
