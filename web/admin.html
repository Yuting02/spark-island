<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>星火岛 · 管理后台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔑</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="admin-body">
  <div class="admin-wrap">
    <!-- 登录 -->
    <div class="admin-card" id="admin-login">
      <h1>🔑 星火岛 · 管理后台</h1>
      <p class="admin-sub">上传与管理岛上内容：AI 新闻（报亭）、书籍 epub（书屋）、播客音频（电台）</p>
      <div class="admin-form">
        <input type="password" id="admin-password" placeholder="管理员密码" autocomplete="current-password">
        <button class="px-btn px-primary" id="admin-login-btn">登录</button>
        <div class="admin-msg" id="admin-login-msg"></div>
      </div>
    </div>

    <!-- 主面板 -->
    <div class="admin-card hidden" id="admin-main">
      <h1>🏝️ 内容管理</h1>
      <p class="admin-sub" id="admin-overview"></p>
      <div class="admin-tabs">
        <button class="px-btn active" data-tab="news">📰 AI 新闻</button>
        <button class="px-btn" data-tab="books">📚 书籍</button>
        <button class="px-btn" data-tab="radio">📻 电台</button>
        <button class="px-btn" id="admin-logout" style="margin-left:auto">退出登录</button>
      </div>
    </div>

    <!-- 新闻 -->
    <div class="admin-card hidden" data-panel="news">
      <h2>发布 AI 新闻（玩家在报亭以报纸形式阅读）</h2>
      <div class="admin-form">
        <div class="admin-row">
          <input type="text" id="news-title" placeholder="标题，如：AI 日报 · 6 月 10 日">
          <input type="date" id="news-date">
        </div>
        <textarea id="news-content" placeholder="正文，支持 Markdown（## 标题、**加粗**、> 引用、- 列表……）"></textarea>
        <button class="px-btn px-primary" id="news-submit">发布</button>
        <div class="admin-msg" id="news-msg"></div>
      </div>
      <div class="admin-list" id="news-list"></div>
    </div>

    <!-- 书籍 -->
    <div class="admin-card hidden" data-panel="books">
      <h2>上传书籍（.epub，玩家在书屋书架阅读）</h2>
      <div class="admin-form">
        <div class="admin-row">
          <input type="text" id="book-title" placeholder="书名">
          <input type="text" id="book-author" placeholder="作者（可选）">
        </div>
        <input type="file" id="book-file" accept=".epub">
        <button class="px-btn px-primary" id="book-submit">上传</button>
        <div class="admin-msg" id="book-msg"></div>
      </div>
      <div class="admin-list" id="book-list"></div>
    </div>

    <!-- 电台 -->
    <div class="admin-card hidden" data-panel="radio">
      <h2>上传电台节目（mp3 / m4a / mp4 / wav / ogg，玩家在电台收听）</h2>
      <div class="admin-form">
        <input type="text" id="radio-title" placeholder="节目名，如：本周 AI 圆桌">
        <input type="file" id="radio-file" accept=".mp3,.m4a,.mp4,.wav,.ogg">
        <button class="px-btn px-primary" id="radio-submit">上传</button>
        <div class="admin-msg" id="radio-msg"></div>
      </div>
      <div class="admin-list" id="radio-list"></div>
    </div>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
